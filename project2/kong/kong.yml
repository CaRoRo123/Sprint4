_format_version: "3.0"
_transform: true

services:
  - name: svc-proyecto
    url: http://10.0.101.239:8000
    routes:
      - name: route-proyecto
        paths: [/api/proyectos]
        strip_path: false  # <--- AÑADE ESTO

  - name: svc-area
    url: http://10.0.101.183:8000
    routes:
      - name: route-area
        paths: [/api/areas]
        strip_path: false  # <--- AÑADE ESTO

  - name: svc-empresa
    url: http://10.0.101.230:8000
    routes:
      - name: route-empresa
        paths: [/api/empresas]
        strip_path: false  # <--- AÑADE ESTO

plugins:
  - name: rate-limiting
    config:
      second: 5
      policy: local
      limit_by: ip