version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# Los servicios apuntan a RDS Aurora + ElastiCache + DynamoDB en AWS.
# Antes de levantar: corré terraform apply y pegá los endpoints en los .env.
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── API GATEWAY ─────────────────────────────────────────────────────────────
  kong:
    image: kong:3.6
    environment:
      KONG_DATABASE:           "off"
      KONG_DECLARATIVE_CONFIG: /kong/kong.yml
      KONG_PROXY_ACCESS_LOG:   /dev/stdout
      KONG_ADMIN_ACCESS_LOG:   /dev/stdout
      KONG_PROXY_ERROR_LOG:    /dev/stderr
      KONG_ADMIN_ERROR_LOG:    /dev/stderr
      KONG_ADMIN_LISTEN:       "0.0.0.0:8001"
    ports:
      - "8000:8000"    # proxy — los clientes llaman aquí
      - "8001:8001"    # admin API
    volumes:
      - ./kong/kong.yml:/kong/kong.yml:ro
    depends_on:
      - svc-proyecto
      - svc-area
      - svc-empresa
    restart: unless-stopped

  # ── SERVICIO PROYECTO ────────────────────────────────────────────────────────
  svc-proyecto:
    build:
      context:    ./services/proyecto
      dockerfile: Dockerfile
    env_file: ./services/proyecto/.env
    ports:
      - "8010:8000"
    volumes:
      - ./services/proyecto:/app
    command: python manage.py runserver 0.0.0.0:8000
    restart: unless-stopped

  # ── SERVICIO AREA ─────────────────────────────────────────────────────────────
  svc-area:
    build:
      context:    ./services/area
      dockerfile: Dockerfile
    env_file: ./services/area/.env
    ports:
      - "8020:8000"
    volumes:
      - ./services/area:/app
    command: python manage.py runserver 0.0.0.0:8000
    restart: unless-stopped

  # ── SERVICIO EMPRESA ──────────────────────────────────────────────────────────
  svc-empresa:
    build:
      context:    ./services/empresa
      dockerfile: Dockerfile
    env_file: ./services/empresa/.env
    ports:
      - "8030:8000"
    volumes:
      - ./services/empresa:/app
    command: python manage.py runserver 0.0.0.0:8000
    restart: unless-stopped
