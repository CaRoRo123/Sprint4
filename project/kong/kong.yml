_format_version: "3.0"
_transform: true

# ─── SERVICIOS UPSTREAM ─────────────────────────────────────────────────────
services:

  - name: svc-proyecto
    url: http://svc-proyecto:8000
    routes:
      - name: route-proyecto
        paths:
          - /api/proyectos
        strip_path: false
        methods:
          - GET
          - POST
          - PUT
          - PATCH
          - DELETE

  - name: svc-area
    url: http://svc-area:8000
    routes:
      - name: route-area
        paths:
          - /api/areas
        strip_path: false
        methods:
          - GET
          - POST
          - PUT
          - PATCH
          - DELETE

  - name: svc-empresa
    url: http://svc-empresa:8000
    routes:
      - name: route-empresa
        paths:
          - /api/empresas
        strip_path: false
        methods:
          - GET
          - POST
          - PUT
          - PATCH
          - DELETE

# ─── PLUGINS GLOBALES ────────────────────────────────────────────────────────
plugins:
  - name: correlation-id
    config:
      header_name: X-Request-ID
      generator: uuid
      echo_downstream: true
